name: Metrics

on:
  # Refresh every 6 hours for always-fresh data
  schedule:
    - cron: "0 */6 * * *"
  # Run manually anytime
  workflow_dispatch:
  # Run on every push
  push:
    branches: ["master", "main"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          committer_message: "🤖 Update metrics [skip ci]"
          committer_branch: main

          # ── Core Options ──────────────────────────────────────────
          user: nipuna-lakruwan
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Colombo
          config_output: default
          config_display: large

          # ── Languages Plugin ──────────────────────────────────────
          # Shows the languages used most across all repositories
          plugin_languages: yes
          plugin_languages_limit: 10
          plugin_languages_sections: most-used
          plugin_languages_colors: github
          plugin_languages_details: percentage, bytes-size
          plugin_languages_indepth: yes

          # ── Activity Plugin ───────────────────────────────────────
          # Recent public activity feed
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
          plugin_activity_filter: all

          # ── Habits Plugin ─────────────────────────────────────────
          # Coding patterns: when you code, what files you touch
          plugin_habits: yes
          plugin_habits_from: 400
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_charts_type: classic
          plugin_habits_trim: yes

          # ── Calendar Plugin ───────────────────────────────────────
          # Full-year contribution heatmap
          plugin_calendar: yes
          plugin_calendar_limit: 1

          # ── Achievements Plugin ───────────────────────────────────
          # GitHub achievement badges (Arctic Code Vault, Pair Extraordinaire, etc.)
          plugin_achievements: yes
          plugin_achievements_display: detailed
          plugin_achievements_secrets: yes
          plugin_achievements_threshold: C

          # ── Topics Plugin ─────────────────────────────────────────
          # Topics from starred repos — shows your interests
          plugin_topics: yes
          plugin_topics_limit: 15
          plugin_topics_mode: icons

          # ── Stars Plugin ──────────────────────────────────────────
          # Recently starred repositories
          plugin_stars: yes
          plugin_stars_limit: 4

          # ── Notable Contributions ─────────────────────────────────
          # Contributions to notable (starred) open-source projects
          plugin_notable: yes
          plugin_notable_filter: "stars:>10"
          plugin_notable_indepth: yes

          # ── Repositories Plugin ───────────────────────────────────
          # Most recently pushed repositories
          plugin_repositories: yes
          plugin_repositories_order: pushed
          plugin_repositories_pinned: 0
          plugin_repositories_limit: 4

<svg viewBox="0 0 680 340" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#58a6ff">
        <animate attributeName="stop-color" values="#58a6ff;#3fb950;#e3b341;#58a6ff" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#3fb950">
        <animate attributeName="stop-color" values="#3fb950;#e3b341;#58a6ff;#3fb950" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#e3b341">
        <animate attributeName="stop-color" values="#e3b341;#58a6ff;#3fb950;#e3b341" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style>
    .mono {
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Courier New', Courier, monospace;
      font-size: 13px;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    .cursor { animation: blink 1.1s step-start infinite; fill: #58a6ff; }
    .a0  { opacity: 0; animation: fadeIn 0.15s 0.4s  both; }
    .a1  { opacity: 0; animation: fadeIn 0.15s 1.3s  both; }
    .a2  { opacity: 0; animation: fadeIn 0.15s 2.1s  both; }
    .a3  { opacity: 0; animation: fadeIn 0.15s 2.9s  both; }
    .a4  { opacity: 0; animation: fadeIn 0.15s 3.7s  both; }
    .a5  { opacity: 0; animation: fadeIn 0.15s 4.5s  both; }
    .a6  { opacity: 0; animation: fadeIn 0.15s 5.3s  both; }
    .a7  { opacity: 0; animation: fadeIn 0.15s 6.4s  both; }
    .a8  { opacity: 0; animation: fadeIn 0.15s 7.2s  both; }
    .a9  { opacity: 0; animation: fadeIn 0.15s 8.0s  both; }
    .a10 { opacity: 0; animation: fadeIn 0.15s 9.1s  both; }
    .a11 { opacity: 0; animation: fadeIn 0.15s 9.9s  both; }
    .a12 { opacity: 0; animation: fadeIn 0.15s 11.0s both; }
  </style>

  <!-- Glow border -->
  <rect x="1" y="1" width="678" height="338" rx="11.5" fill="none" stroke="url(#borderGrad)" stroke-width="1.5" opacity="0.7"/>

  <!-- Main window -->
  <rect width="680" height="340" rx="12" fill="url(#bgGrad)"/>
  <rect width="680" height="340" rx="12" fill="none" stroke="#21262d" stroke-width="1"/>

  <!-- Title bar -->
  <rect width="680" height="42" rx="12" fill="#161b22"/>
  <rect y="30" width="680" height="12" fill="#161b22"/>
  <line x1="0" y1="42" x2="680" y2="42" stroke="#21262d" stroke-width="1"/>

  <!-- Traffic lights -->
  <circle cx="22" cy="21" r="6.5" fill="#ff5f57" filter="url(#glow)"/>
  <circle cx="43" cy="21" r="6.5" fill="#febc2e" filter="url(#glow)"/>
  <circle cx="64" cy="21" r="6.5" fill="#28c840" filter="url(#glow)"/>

  <!-- Window title -->
  <text x="340" y="26" text-anchor="middle" fill="#6e7681" font-family="monospace" font-size="11.5">nipuna@universe - zsh - 80x24</text>

  <!-- Block 1: whoami -->
  <text class="mono a0" y="65">
    <tspan x="20" fill="#3fb950">&#10095;</tspan>
    <tspan fill="#e6edf3"> whoami</tspan>
  </text>
  <text class="mono a1" y="83">
    <tspan x="20" fill="#58a6ff">  nipuna-lakruwan</tspan>
    <tspan fill="#6e7681">  # builds things that think &#x1F9E0;</tspan>
  </text>

  <!-- Block 2: journey log -->
  <text class="mono a2" y="108">
    <tspan x="20" fill="#3fb950">&#10095;</tspan>
    <tspan fill="#e6edf3"> cat ./journey.log</tspan>
  </text>
  <text class="mono a3" y="126">
    <tspan x="20" fill="#6e7681">  2023 &#x25B8; </tspan>
    <tspan fill="#c9d1d9">Web Dev   </tspan>
    <tspan fill="#3fb950">[PHP &#xB7; JS &#xB7; MySQL]</tspan>
  </text>
  <text class="mono a4" y="144">
    <tspan x="20" fill="#6e7681">  2025 &#x25B8; </tspan>
    <tspan fill="#c9d1d9">DevOps    </tspan>
    <tspan fill="#3fb950">[Docker &#xB7; Linux &#xB7; CI/CD &#xB7; K8s]</tspan>
  </text>
  <text class="mono a5" y="162">
    <tspan x="20" fill="#6e7681">  2026 &#x25B8; </tspan>
    <tspan fill="#c9d1d9">AI Space  </tspan>
    <tspan fill="#58a6ff">[Python &#xB7; LangChain &#xB7; HuggingFace]</tspan>
  </text>
  <text class="mono a6" y="180">
    <tspan x="20" fill="#6e7681">  NOW  &#x25B8; </tspan>
    <tspan fill="#c9d1d9">Shipping  </tspan>
    <tspan fill="#e3b341">AI Products &#x2192; Production &#x1F680;</tspan>
  </text>

  <!-- Block 3: status -->
  <text class="mono a7" y="205">
    <tspan x="20" fill="#3fb950">&#10095;</tspan>
    <tspan fill="#e6edf3"> ./status.sh</tspan>
  </text>
  <text class="mono a8" y="223">
    <tspan x="20" fill="#6e7681">  &#x1F4CD; </tspan>
    <tspan fill="#c9d1d9">Sri Lanka</tspan>
    <tspan fill="#6e7681">   |   </tspan>
    <tspan fill="#c9d1d9">&#x1F310; Open to Remote</tspan>
  </text>
  <text class="mono a9" y="241">
    <tspan x="20" fill="#6e7681">  &#x1F52D; </tspan>
    <tspan fill="#c9d1d9">Focus: </tspan>
    <tspan fill="#58a6ff">AI-powered product development</tspan>
  </text>

  <!-- Block 4: motto -->
  <text class="mono a10" y="266">
    <tspan x="20" fill="#3fb950">&#10095;</tspan>
    <tspan fill="#e6edf3"> echo $MOTTO</tspan>
  </text>
  <text class="mono a11" y="284">
    <tspan x="20" fill="#e3b341">  "Build. Ship. Learn. Repeat." &#x2728;</tspan>
  </text>

  <!-- Final prompt + blinking cursor -->
  <text class="mono a12" y="309">
    <tspan x="20" fill="#3fb950">&#10095; </tspan>
  </text>
  <text class="mono a12 cursor" x="36" y="309">&#x2587;</text>
</svg>
